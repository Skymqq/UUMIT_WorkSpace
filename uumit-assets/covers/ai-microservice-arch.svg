<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="16"/>
  
  <!-- Glow effect -->
  <rect x="100" y="50" width="600" height="500" fill="url(#glow)" rx="12"/>
  
  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="60" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <circle cx="680" cy="80" r="40" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <circle cx="120" cy="520" r="50" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
  
  <!-- Grid lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#22d3ee" stroke-width="0.3" opacity="0.15"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="#22d3ee" stroke-width="0.3" opacity="0.1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#22d3ee" stroke-width="0.3" opacity="0.15"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#22d3ee" stroke-width="0.3" opacity="0.1"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#22d3ee" stroke-width="0.3" opacity="0.15"/>
  
  <!-- Accent line -->
  <rect x="100" y="180" width="80" height="4" fill="#22d3ee" rx="2"/>
  
  <!-- Icon -->
  <text x="400" y="200" text-anchor="middle" font-size="64" font-family="Arial">⚡</text>
  
  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="bold" fill="#e2e8f0">AI 微服务系统架构</text>
  
  <!-- Subtitle -->
  <text x="400" y="330" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#94a3b8">多层AI系统架构可视化</text>
  
  <!-- UUMit Knowledge Store badge -->
  <rect x="310" y="360" width="180" height="32" rx="16" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <text x="400" y="381" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#22d3ee" opacity="0.8">UUMit 知识商店</text>
  
  <!-- Bottom decoration -->
  <rect x="150" y="500" width="500" height="1" fill="#22d3ee" opacity="0.2"/>
  <circle cx="140" cy="500" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="660" cy="500" r="3" fill="#22d3ee" opacity="0.4"/>
</svg>