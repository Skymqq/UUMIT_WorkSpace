<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识库系统架构</title>
<style>
@font-face {
  font-family: 'JetBrains Mono';
  src: local('JetBrains Mono'), local('JetBrainsMono-Regular');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'JetBrains Mono';
  src: local('JetBrains Mono Bold'), local('JetBrainsMono-Bold');
  font-weight: bold;
  font-style: normal;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
  min-height: 100vh;
}
.container {
  width: 1000px;
  max-width: 100%;
}
h1 {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #f1f5f9;
  margin-bottom: 30px;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255,255,255,0.08);
}
svg {
  display: block;
  width: 100%;
  height: auto;
  background: #020617;
  border-radius: 12px;
}
</style>
</head>
<body>
<div class="container">
  <h1>RAG 知识库系统架构</h1>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" width="960" height="1080">
    <defs>
      <!-- Background grid pattern -->
      <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
        <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
      </pattern>
      <pattern id="grid-dot" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="12" cy="12" r="1" fill="#334155" opacity="0.4"/>
      </pattern>

      <!-- Glow filters -->
      <filter id="glow-cyan">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.3"/>
      </filter>
      <filter id="glow-emerald">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#34d399" flood-opacity="0.3"/>
      </filter>
      <filter id="glow-violet">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a78bfa" flood-opacity="0.3"/>
      </filter>
      <filter id="glow-amber">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fbbf24" flood-opacity="0.3"/>
      </filter>
      <filter id="glow-slate">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.3"/>
      </filter>

      <!-- Arrow marker -->
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#475569"/>
      </marker>
      <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/>
      </marker>
      <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#34d399"/>
      </marker>
      <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#a78bfa"/>
      </marker>
      <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/>
      </marker>

      <mask id="arrow-mask">
        <rect x="0" y="0" width="960" height="1080" fill="white"/>

    <!-- Background -->
    <rect x="0" y="0" width="960" height="1080" fill="#020617"/>
    <rect x="0" y="0" width="960" height="1080" fill="url(#grid)"/>
    <rect x="0" y="0" width="960" height="1080" fill="url(#grid-dot)"/>

    <!-- ============================================================ -->
    <!-- LAYER 1: 前端接入层 (cyan) - y: 80 -->

    <text x="700" y="132" text-anchor="middle" font-size="12" fill="#22d3ee" font-weight="bold">API Endpoint</text>

    <text x="700" y="632" text-anchor="middle" font-size="12" fill="#fbbf24" font-weight="bold">Index Builder</text>

    <rect x="80" y="765" width="200" height="70" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5" filter="url(#glow-slate)"/>

    <!-- Layer 2 -> Layer 3: 应用编排层 -> 检索增强层 -->
